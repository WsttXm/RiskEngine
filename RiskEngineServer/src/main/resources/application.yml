server:
  port: 8080

spring:
  application:
    name: RiskEngineServer

  datasource:
    url: jdbc:mysql://localhost:3306/risk_engine?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: risk_engine
    password: ${MYSQL_PASSWORD:risk_engine_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  thymeleaf:
    cache: false

  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}

# 风控引擎配置
risk-engine:
  encryption:
    enabled: true
