<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${isNew} ? '新建规则' : '编辑规则', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="page-header">
        <h5 th:text="${isNew} ? '新建规则' : '编辑规则'"></h5>
        <a th:href="@{/rules}" class="btn btn-outline-secondary btn-sm">返回列表</a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="${isNew} ? @{/rules} : @{/rules/{id}(id=${rule.id})}" method="post">
                <div class="row g-3">
                    <div class="col-lg-6">
                        <label for="ruleName" class="form-label">规则名称</label>
                        <input type="text" class="form-control" id="ruleName" name="ruleName"
                               th:value="${rule.ruleName}" required placeholder="例如: 检测Root设备">
                    </div>
                    <div class="col-lg-6">
                        <div class="row g-3">
                            <div class="col-8">
                                <label for="riskLevel" class="form-label">命中后标记风险等级</label>
                                <select class="form-select" id="riskLevel" name="riskLevel">
                                    <option value="LOW" th:selected="${rule.riskLevel == 'LOW'}">LOW</option>
                                    <option value="MEDIUM" th:selected="${rule.riskLevel == 'MEDIUM'}">MEDIUM</option>
                                    <option value="HIGH" th:selected="${rule.riskLevel == 'HIGH'}">HIGH</option>
                                    <option value="DEADLY" th:selected="${rule.riskLevel == 'DEADLY'}">DEADLY</option>
                                </select>
                            </div>
                            <div class="col-4 d-flex align-items-end">
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" name="enabled" value="true"
                                           th:checked="${rule.enabled}" id="enabled">
                                    <label class="form-check-label" for="enabled">启用</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <label for="description" class="form-label">描述</label>
                        <input type="text" class="form-control" id="description" name="description"
                               th:value="${rule.description}" placeholder="规则的详细说明">
                    </div>
                    <div class="col-12">
                        <label for="ruleExpression" class="form-label">SpEL 表达式</label>
                        <textarea class="form-control" id="ruleExpression" name="ruleExpression" rows="3"
                                  style="font-family:'JetBrains Mono',monospace;font-size:0.85rem"
                                  th:text="${rule.ruleExpression}" required
                                  placeholder="例如: overallRiskLevel == 'HIGH'"></textarea>
                        <div class="form-text">
                            可用变量: <code>overallRiskLevel</code>, <code>detections</code> (列表), <code>fingerprint</code> (Map), <code>inconsistentFields</code> (列表), <code>reportCount</code>, <code>riskMarked</code>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-sm" th:text="${isNew} ? '创建规则' : '保存修改'"></button>
                            <a th:href="@{/rules}" class="btn btn-outline-secondary btn-sm">取消</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
