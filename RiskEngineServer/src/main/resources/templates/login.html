<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - RiskEngine</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="card">
            <div class="card-body p-4">
                <h3 class="text-center mb-1" style="font-weight:700;color:#1e293b">RiskEngine</h3>
                <p class="text-center text-muted mb-4" style="font-size:0.85rem">移动安全风控运营平台</p>

                <div th:if="${param.error}" class="alert alert-danger py-2" style="font-size:0.85rem">
                    用户名或密码错误
                </div>
                <div th:if="${param.logout}" class="alert alert-success py-2" style="font-size:0.85rem">
                    已退出登录
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
