<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout('上报详情', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="page-header">
        <h5>上报详情 #<span th:text="${report.id}"></span></h5>
        <a th:href="@{/reports}" class="btn btn-outline-secondary btn-sm">返回列表</a>
    </div>

    <div class="row g-3">
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header">基本信息</div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <tr><th style="width:30%;padding-left:1rem">设备</th><td>
                            <a th:href="@{/devices/{id}(id=${report.device.id})}" class="device-id"
                               th:text="${#strings.abbreviate(report.device.deviceId, 24)}"></a>
                        </td></tr>
                        <tr><th style="padding-left:1rem">应用</th><td th:text="${report.app.appName}"></td></tr>
                        <tr><th style="padding-left:1rem">风险等级</th><td>
                            <span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(report.overallRiskLevel)}" th:text="${report.overallRiskLevel}"></span>
                        </td></tr>
                        <tr><th style="padding-left:1rem">风险得分</th><td th:text="${reportData.riskScore + '/' + reportData.maxRiskScore}"></td></tr>
                        <tr><th style="padding-left:1rem">危险信号</th><td th:text="${reportData.dangerCount}"></td></tr>
                        <tr><th style="padding-left:1rem">告警信号</th><td th:text="${reportData.warningCount}"></td></tr>
                        <tr><th style="padding-left:1rem">SDK版本</th><td th:text="${report.sdkVersion}"></td></tr>
                        <tr><th style="padding-left:1rem">接收时间</th><td th:text="${#temporals.format(report.receivedAt, 'yyyy-MM-dd HH:mm:ss')}"></td></tr>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card">
                <div class="card-header">检测结果 (Detections)</div>
                <div class="card-body p-0">
                    <div th:if="${reportData.detections == null || reportData.detections.isEmpty()}" class="p-3 text-muted">
                        无检测结果
                    </div>
                    <table th:if="${reportData.detections != null && !reportData.detections.isEmpty()}" class="table table-sm mb-0">
                        <thead>
                        <tr>
                            <th style="padding-left:1rem">检测项</th>
                            <th>状态</th>
                            <th>分值</th>
                            <th>warnOnly</th>
                            <th>证据链</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="detection : ${reportData.detections}">
                            <td style="padding-left:1rem">
                                <div th:text="${detection.detectorName}"></div>
                                <small class="text-muted" th:text="${detection.riskLevel}"></small>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${detection.status == 'DANGER'} ? 'badge-deadly' : (${detection.status == 'WARNING'} ? 'badge-medium' : 'badge-safe')"
                                      th:text="${detection.status}"></span>
                            </td>
                            <td th:text="${detection.score + '/' + detection.maxScore}"></td>
                            <td th:text="${detection.warnOnly ? 'YES' : 'NO'}"></td>
                            <td>
                                <div th:if="${detection.details != null && !detection.details.isEmpty()}">
                                    <div th:each="detail : ${detection.details}" class="mb-1">
                                        <code th:text="${detail}"></code>
                                    </div>
                                </div>
                                <div th:if="${detection.details == null || detection.details.isEmpty()}">
                                    <code th:text="${detection.evidence}"></code>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card">
                <div class="card-header">设备指纹 (Fingerprint)</div>
                <div class="card-body">
                    <div class="json-view json-raw" th:text="${report.fingerprintJson}"></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
