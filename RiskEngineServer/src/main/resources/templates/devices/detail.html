<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout('设备详情', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="page-header">
        <h5>设备详情</h5>
        <a th:href="@{/devices}" class="btn btn-outline-secondary btn-sm">返回列表</a>
    </div>

    <div class="row g-3">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">基本信息</div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <tr><th style="width:30%;padding-left:1rem">设备ID</th><td class="device-id" th:text="${device.deviceId}"></td></tr>
                        <tr><th style="padding-left:1rem">风险等级</th><td>
                            <span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(device.lastRiskLevel)}" th:text="${device.lastRiskLevel}"></span>
                        </td></tr>
                        <tr><th style="padding-left:1rem">上报次数</th><td th:text="${device.reportCount}"></td></tr>
                        <tr><th style="padding-left:1rem">首次出现</th><td th:text="${#temporals.format(device.firstSeenAt, 'yyyy-MM-dd HH:mm:ss')}"></td></tr>
                        <tr><th style="padding-left:1rem">最后活跃</th><td th:text="${#temporals.format(device.lastSeenAt, 'yyyy-MM-dd HH:mm:ss')}"></td></tr>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">风险标记</div>
                <div class="card-body">
                    <div th:if="${device.riskMarked}" class="alert alert-danger py-2 mb-2" style="font-size:0.85rem">
                        此设备已被标记为风险设备
                        <span th:if="${device.riskNote != null}"> | 备注: <strong th:text="${device.riskNote}"></strong></span>
                    </div>
                    <form th:action="@{/devices/{id}/mark(id=${device.id})}" method="post">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="riskMarked" value="true"
                                   th:checked="${device.riskMarked}" id="riskMarked">
                            <label class="form-check-label" for="riskMarked" style="font-size:0.85rem">标记为风险设备</label>
                        </div>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" name="riskNote"
                                   th:value="${device.riskNote}" placeholder="标记原因">
                            <button type="submit" class="btn btn-warning">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card">
                <div class="card-header">上报历史</div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>风险等级</th>
                                <th>SDK版本</th>
                                <th>接收时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="report : ${reports}">
                                <td th:text="${report.id}"></td>
                                <td>
                                    <span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(report.overallRiskLevel)}" th:text="${report.overallRiskLevel}"></span>
                                </td>
                                <td th:text="${report.sdkVersion}"></td>
                                <td th:text="${#temporals.format(report.receivedAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                                <td><a th:href="@{/reports/{id}(id=${report.id})}" class="btn btn-outline-primary btn-sm">详情</a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card">
                <div class="card-header">规则命中记录</div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>规则名称</th>
                                <th>命中时间</th>
                                <th>详情</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="hit : ${ruleHits}">
                                <td th:text="${hit.rule.ruleName}"></td>
                                <td th:text="${#temporals.format(hit.hitAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                                <td th:text="${hit.detail}"></td>
                            </tr>
                            <tr th:if="${ruleHits.isEmpty()}">
                                <td colspan="3" class="text-center text-muted py-3">无规则命中记录</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
