# 开发环境配置 - 使用H2内存数据库, 无需MySQL
# 启动方式: java -jar app.jar --spring.profiles.active=dev
spring:
  datasource:
    url: jdbc:h2:file:./data/risk_engine;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
